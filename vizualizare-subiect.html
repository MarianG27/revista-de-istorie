<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizualizare Subiect - Revista de Istorie</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #FAF6F0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Bara de sus custom */
        .pdf-header {
            background-color: #1C1611;
            color: #FFFFFF;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #C29B53;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .pdf-title {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #FAF6F0;
            margin: 0;
            letter-spacing: 1px;
        }

        .btn-download {
            background-color: #C29B53;
            color: #1C1611;
            border: none;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #E0B86F;
            transform: translateY(-2px);
        }

        /* Containerul pentru PDF */
        .pdf-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #525659; /* Culoarea standard a cititoarelor PDF */
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media (max-width: 600px) {
            .pdf-header {
                padding: 12px 15px;
                gap: 10px;
            }
            .pdf-title {
                font-size: 0.85rem;
            }
            .btn-download {
                padding: 8px 12px;
                font-size: 0.75rem;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

    <header class="pdf-header">
        <h1 class="pdf-title" id="document-title">Subiect Bacalaureat</h1>
        <a href="#" id="download-button" class="btn-download" download>
            <i class="fa-solid fa-cloud-arrow-down"></i> DESCARCĂ PDF
        </a>
    </header>

    <div class="pdf-container">
        <iframe id="pdf-viewer" src="" allowfullscreen></iframe>
    </div>

    <script>
        // Citim parametrii trimiși în URL (url-ul pdf-ului și titlul)
        const params = new URLSearchParams(window.location.search);
        const pdfUrl = params.get('url');
        const titluDoc = params.get('titlu');

        if (pdfUrl) {
            // Folosim Google Docs Viewer: afișează TOATE paginile documentului,
            // cu scroll, în mod identic pe telefon, tabletă și desktop
            // (spre deosebire de vizualizatorul nativ din browser, care pe mobil
            // arăta uneori doar prima pagină).
            const viewerUrl = "https://docs.google.com/viewer?embedded=true&url=" + encodeURIComponent(pdfUrl);

            document.getElementById('pdf-viewer').src = viewerUrl;
            document.getElementById('download-button').href = pdfUrl;

            if (titluDoc) {
                document.getElementById('document-title').innerText = decodeURIComponent(titluDoc).toUpperCase();
                document.title = decodeURIComponent(titluDoc) + " - Revista de Istorie";
            }
        } else {
            document.getElementById('document-title').innerText = "EROARE: Documentul nu a fost găsit.";
        }
    </script>

</body>
</html>
